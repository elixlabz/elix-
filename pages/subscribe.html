<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S'abonner – Elix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .subscribe-page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 24px; }
    .subscribe-card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:48px 40px; width:100%; max-width:460px; }
    .sub-creator { display:flex; align-items:center; gap:16px; margin-bottom:28px; padding-bottom:28px; border-bottom:1px solid var(--border); }
    .sub-avatar { width:56px; height:56px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent2)); flex-shrink:0; }
    .sub-name { font-weight:700; font-size:18px; }
    .sub-handle { font-size:13px; color:var(--muted); }
    .sub-price-box { text-align:center; margin-bottom:28px; }
    .sub-price-big { font-size:48px; font-weight:700; background:linear-gradient(135deg,var(--accent),var(--accent-light)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .sub-period { color:var(--muted); font-size:14px; }
    .perks { list-style:none; margin-bottom:28px; display:flex; flex-direction:column; gap:12px; }
    .perks li { display:flex; align-items:center; gap:10px; font-size:14px; color:var(--muted); }
    .perks li span { color:var(--accent); font-size:16px; }
    .divider { border:none; border-top:1px solid var(--border); margin:24px 0; }
    .payment-title { font-size:13px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:16px; }
    .card-row { display:flex; gap:12px; }
    .card-row .form-group { flex:1; }
    .secure-note { display:flex; align-items:center; justify-content:center; gap:6px; font-size:12px; color:var(--muted); margin-top:16px; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="../index.html" class="logo">Elix</a>
    <div class="nav-links">
      <a href="explore.html">Explorer</a>
    </div>
  </nav>

  <div class="subscribe-page">
    <div class="subscribe-card">
      <div class="sub-creator">
        <div class="sub-avatar"></div>
        <div>
          <div class="sub-name">Sophia</div>
          <div class="sub-handle">@sophia_elix · ✔ Vérifiée</div>
        </div>
      </div>

      <div class="sub-price-box">
        <div class="sub-price-big">9,99€</div>
        <div class="sub-period">par mois · Résiliable à tout moment</div>
      </div>

      <ul class="perks">
        <li><span>✔</span> Accès à tout le contenu premium</li>
        <li><span>✔</span> Messages privés avec la créatrice</li>
        <li><span>✔</span> Nouveau contenu chaque semaine</li>
        <li><span>✔</span> Résiliation en un clic</li>
      </ul>

      <hr class="divider" />
      <div class="payment-title">Paiement sécurisé</div>

      <div class="form-group">
        <label>Numéro de carte</label>
        <input type="text" placeholder="1234 5678 9012 3456" maxlength="19" />
      </div>
      <div class="card-row">
        <div class="form-group">
          <label>Expiration</label>
          <input type="text" placeholder="MM/AA" maxlength="5" />
        </div>
        <div class="form-group">
          <label>CVC</label>
          <input type="text" placeholder="123" maxlength="3" />
        </div>
      </div>

      <button class="form-submit" onclick="handleSubscribe()">Confirmer l'abonnement · 9,99€</button>
      <div class="secure-note">🔒 Paiement sécurisé par Stripe</div>
    </div>
  </div>

  <script>
    function handleSubscribe() {
      alert('✅ Abonnement confirmé ! Bienvenue sur Elix.');
      window.location.href = 'profile.html';
    }
  </script>
</body>
</html>
