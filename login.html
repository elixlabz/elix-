<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion – Elix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <nav class="navbar">
    <a href="../index.html" class="logo">Elix</a>
    <div class="nav-links">
      <a href="explore.html">Explorer</a>
      <a href="register.html" class="btn-primary">S'inscrire</a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <span class="auth-logo">Elix</span>
      <p class="auth-subtitle">Connectez-vous à votre compte</p>

      <div class="form-group">
        <label>Adresse email</label>
        <input type="email" placeholder="votre@email.com" />
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" placeholder="••••••••" />
      </div>

      <div style="text-align:right; margin-bottom:20px;">
        <a href="#" style="font-size:13px; color:var(--accent);">Mot de passe oublié ?</a>
      </div>

      <button class="form-submit" onclick="window.location.href='dashboard.html'">Se connecter</button>

      <div class="auth-footer">
        Pas encore de compte ? <a href="register.html">S'inscrire gratuitement</a>
      </div>
    </div>
  </div>
</body>
</html>
